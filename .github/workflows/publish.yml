name: Publish to NuGet.org

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for NuGet trusted publishing OIDC

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack DotnetMls.Crypto
        run: dotnet pack src/DotnetMls.Crypto/DotnetMls.Crypto.csproj --no-build --configuration Release /p:Version=${{ steps.version.outputs.VERSION }} --output ./nupkgs

      - name: Pack DotnetMls
        run: dotnet pack src/DotnetMls/DotnetMls.csproj --no-build --configuration Release /p:Version=${{ steps.version.outputs.VERSION }} --output ./nupkgs

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: MadMarmot

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
